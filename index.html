<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FellowGrid</title>
<style>
body{margin:0;background:#0a0f1a;color:#eef2ff;font-family:Arial,sans-serif}.header{background:#0f1622;padding:18px;border-bottom:1px solid #1e2a3a}.header h1{margin:0;font-size:34px}.header p{color:#91a4bd}.nav{display:flex;gap:14px;overflow:auto;margin-top:12px}.nav button{background:none;border:0;color:#b9c7d9;padding:8px 0;font-weight:bold}.nav button.active{color:white;border-bottom:2px solid #3b82f6}.main{display:grid;grid-template-columns:1fr 340px;min-height:calc(100vh - 135px)}.content{padding:22px}.card{background:#111827;border:1px solid #253040;border-radius:18px;padding:18px;margin-bottom:18px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.tile{background:#0f1622;border:1px solid #253040;border-radius:14px;padding:14px}.chat{background:#0c111c;border-left:1px solid #253040;padding:14px;display:flex;flex-direction:column;gap:10px}.messages{flex:1;background:#0a0f18;border:1px solid #253040;border-radius:16px;padding:12px;overflow:auto}.msg{padding:10px 12px;border-radius:12px;margin:8px 0;max-width:90%;white-space:pre-wrap}.bot{background:#16202c}.user{background:#1e2a3a;margin-left:auto}.input{display:flex;gap:8px;background:#0a0f18;border:1px solid #253040;border-radius:30px;padding:8px}.input input{flex:1;background:transparent;border:0;outline:0;color:white}.btn{background:#3b82f6;border:0;color:white;border-radius:22px;padding:8px 14px;font-weight:bold}.stage{background:#1e293b;border-radius:30px;padding:12px;text-align:center;margin:10px 0;cursor:pointer}footer{text-align:center;color:#6c86a3;border-top:1px solid #253040;padding:12px;font-size:12px}@media(max-width:800px){.main{display:block}.chat{border-left:0;border-top:1px solid #253040;min-height:420px}.content{padding:14px}}
</style>
</head>
<body>
<div class="header"><h1>FellowGrid</h1><p>Pascalogix Structura FellowGrid · CRM · LMS · Social · Reversible Funnel</p><div class="nav"><button class="active" data-tab="dashboard">Dashboard</button><button data-tab="crm">CRM</button><button data-tab="lms">LMS</button><button data-tab="social">Social</button><button data-tab="funnel">Reversible Funnel</button></div></div>
<div class="main"><main id="content" class="content"></main><aside class="chat"><div id="messages" class="messages"><div class="msg bot">FellowGrid Assistant is live. Ask about constructs, CRM, LMS, readiness, or funnel flow.</div></div><div class="input"><input id="q" placeholder="Ask FellowGrid..."><button id="send" class="btn">Send</button></div><small style="color:#8ba0bc">Live demo mode.</small></aside></div>
<footer>© Maynard Rafael Pascasio · Pascalogix Structura</footer>
<script>
const content=document.getElementById('content');
function dashboard(){return '<div class="card"><h2>FellowGrid Dashboard</h2><p>CRM, LMS, social proof flow, and reversible funnel logic in one governed platform concept.</p><div class="grid"><div class="tile"><b>CRM</b><br>Relationship mapping</div><div class="tile"><b>LMS</b><br>Construct delivery</div><div class="tile"><b>Social</b><br>Proof and community</div><div class="tile"><b>Funnel</b><br>Forward and reverse movement</div></div></div>'}
function crm(){return '<div class="card"><h2>CRM</h2><div class="grid"><div class="tile"><b>Enterprise Partners</b><br>Owners, contractors, institutions</div><div class="tile"><b>Fellows</b><br>Learners and operators</div><div class="tile"><b>Allies</b><br>Implementation support</div><div class="tile"><b>Commercial Lane</b><br>Deployment and licensing</div></div></div>'}
function lms(){return '<div class="card"><h2>LMS</h2><div class="grid"><div class="tile"><b>Transaction Origin Mapping</b><br>Real event to accounting effect.</div><div class="tile"><b>Flow Link Analysis</b><br>Input to process to output.</div><div class="tile"><b>Decision Impact Modeling</b><br>Decision to variables to outcome.</div><div class="tile"><b>Control Failure Simulation</b><br>Failure point to prevention.</div><div class="tile"><b>Feasibility Kill Testing</b><br>Assumption to breakpoint.</div></div></div>'}
function social(){return '<div class="card"><h2>Social Feed</h2><div class="tile"><b>FellowGrid Update</b><br>Safe live demo is operational.</div><br><div class="tile"><b>Platform Direction</b><br>Constructs move toward enterprise deployment.</div></div>'}
function funnel(){return '<div class="card"><h2>Reversible Funnel</h2><div id="funnel"><div class="stage">Awareness</div><div class="stage">Interest</div><div class="stage">Decision</div><div class="stage">Action</div></div><button id="reverse" class="btn">Reverse</button><p>Forward: lead to conversion. Backward: outcome to evidence and origin.</p></div>'}
function load(t){content.innerHTML={dashboard:dashboard(),crm:crm(),lms:lms(),social:social(),funnel:funnel()}[t];document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));if(t==='funnel')document.getElementById('reverse').onclick=()=>Array.from(document.querySelectorAll('.stage')).reverse().forEach(x=>document.getElementById('funnel').appendChild(x))}
document.querySelectorAll('.nav button').forEach(b=>b.onclick=()=>load(b.dataset.tab));
const box=document.getElementById('messages'),q=document.getElementById('q');function add(t,u){let d=document.createElement('div');d.className='msg '+(u?'user':'bot');d.innerText=t;box.appendChild(d);box.scrollTop=box.scrollHeight}function reply(s){s=s.toLowerCase();if(s.includes('live')||s.includes('fixed'))return 'Yes. The page is live in demo mode.';if(s.includes('funnel'))return 'The funnel works forward from awareness to action and backward from outcome to evidence.';if(s.includes('crm'))return 'CRM organizes partners, fellows, allies, and deployment lanes.';if(s.includes('lms')||s.includes('construct'))return 'The LMS has five core constructs: origin, flow, decision, control, and feasibility.';if(s.includes('readiness')||s.includes('governance'))return 'Readiness means authority, evidence, ownership, approval, correction, and accountability are clear before scale.';return 'FellowGrid combines CRM, LMS, social proof, and reversible funnel logic.'}function send(){let s=q.value.trim();if(!s)return;add(s,true);q.value='';add(reply(s),false)}document.getElementById('send').onclick=send;q.onkeydown=e=>{if(e.key==='Enter')send()};load('dashboard');
</script>
</body>
</html>
